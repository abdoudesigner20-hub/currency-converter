name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3 python3-pip \
          build-essential git \
          autoconf libtool pkg-config \
          zip unzip openjdk-17-jdk \
          libffi-dev libssl-dev \
          libltdl-dev ccache \
          libsdl2-dev libsdl2-image-dev \
          libsdl2-mixer-dev libsdl2-ttf-dev

    - name: Install Python packages
      run: |
        pip3 install --upgrade pip setuptools
        pip3 install buildozer==1.5.0
        pip3 install cython==0.29.33

    - name: Set JAVA_HOME
      run: |
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
        echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

    - name: Pre-accept Android licenses
      run: |
        mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
        echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" \
          > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" \
          > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license

    - name: Build APK
      run: |
        yes | buildozer -v android debug 2>&1 | tee build.log
        ls -la bin/ || echo "No bin folder"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Currency-Converter-APK
        path: bin/*.apk
        if-no-files-found: warn

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
