name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip zip unzip openjdk-17-jdk \
          libffi-dev libssl-dev autoconf libtool
        pip install buildozer cython virtualenv

    - name: Accept Android licenses
      run: |
        mkdir -p $HOME/.android
        echo "count=0" > $HOME/.android/repositories.cfg
        yes | sudo apt-get install -y sdkmanager || true
        pip install buildozer
        mkdir -p $HOME/.buildozer/android/platform/android-sdk/licenses
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" \
          > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo "84831b9409646a918e30573bab4c9c91346d8abd" \
          >> $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo "d975f751698a77b662f1254ddbeed3901e976f5a" \
          > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license

    - name: Build APK
      run: |
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        buildozer android debug 2>&1 | tee build.log

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: bin/*.apk

    - name: Upload log if failed
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
